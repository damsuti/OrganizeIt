services:
  db:
    image: postgres:15-alpine
    container_name: agenda_db_container
    environment:
      POSTGRES_USER: admin_agenda
      POSTGRES_PASSWORD: senha_secreta_infra
      POSTGRES_DB: agenda_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_agenda -d agenda_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agenda_network

  web:
    build: ./app
    container_name: agenda_flask_container
    restart: always
    ports:
      - "5000:5000"
    environment:
      - POSTGRES_USER=admin_agenda
      - POSTGRES_PASSWORD=senha_secreta_infra
      - POSTGRES_DB=agenda_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agenda_network
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app
        - action: rebuild
          path: ./app/requirements.txt

volumes:
  postgres_data:

networks:
  agenda_network:
    driver: bridge