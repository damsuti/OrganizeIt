<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrganizeIT - Autenticação</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .auth-card { max-width: 450px; margin-top: 10%; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center">
        <div class="card shadow auth-card w-100 p-4">
            <h2 class="text-center text-primary mb-4">OrganizeIT</h2>
            
            <div id="alert-box" class="alert hidden" role="alert"></div>

            <div id="login-area">
                <h4 class="mb-3">Acessar Conta</h4>
                <form id="login-form">
                    <div class="mb-3">
                        <input type="text" id="login-username" class="form-control" placeholder="Usuário" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" id="login-password" class="form-control" placeholder="Senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
                <p class="text-center mt-3 mb-0">Não tem uma conta? <a href="#" id="to-register">Criar conta</a></p>
            </div>

            <div id="register-area" class="hidden">
                <h4 class="mb-3">Criar Nova Conta</h4>
                <form id="register-form">
                    <div class="mb-3">
                        <input type="text" id="register-username" class="form-control" placeholder="Escolha um Usuário" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" id="register-password" class="form-control" placeholder="Crie uma Senha" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Registrar Conta</button>
                </form>
                <p class="text-center mt-3 mb-0">Já tem uma conta? <a href="#" id="to-login">Voltar para o Login</a></p>
            </div>

        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
